<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
<!--
    Change the scale for each of these shapes. 
    You do not need to modify any other attribues.
    
    <hint> You might want to use these numbers: </hint>
    <hint> 0.5, 3, 5, 1000 </hint>
-->

    <a-box 
        position="-1 3 -5"
        color="orange"
        scale="0.2 5 0.9"
    ></a-box>        

    <a-box 
        position="2 3 -5"
        color="green"
        scale="0.67 0.3 3"
    ></a-box>
    
    <a-cylinder 
        position="0 1 -5"
        color="red"
        rotation="30 50 100"
        scale="0.67 0.67 0.67"
    ></a-cylinder>
    
    <a-torus 
        position="0 1.6 -4"
        color="blue"
        rotation="0 60 20"
        scale="1 2 0.2"
    ></a-torus>
    
        </a-scene>
    </body>
</html>

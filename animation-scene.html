<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="blue"></a-sky>
        <a-box position="0 2 -4" color="white"
                animation="
                property:position;
                from:0 1 -4;
                to:0 -1 -4;
                loop:true;
                dura:2000;
                dir:alternate;
                "
        ></a-box>

        <a-box position="2 2 -4" color="white"
                animation="
                property:position;
                from:2 -1 -4;
                to:2 1 -4;
                dura:2000;
                loop:true;
                dir:alternate;
                "
        ></a-box>

        </a-scene>
    </body>
</html>
